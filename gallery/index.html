<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio de Imágenes - Revista Nacional de Ciencias para Estudiantes</title>
    <style>
        /* Mismo CSS que tenías antes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            opacity: 0.95;
            font-size: 1.1rem;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        
        .search-section {
            padding: 1.5rem;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .search-box {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .search-box .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
        }
        
        .gallery-header {
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .gallery-header h2 {
            color: #495057;
        }
        
        .view-controls {
            display: flex;
            gap: 0.5rem;
        }
        
        .view-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .view-btn:hover,
        .view-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .gallery {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .gallery.list-view {
            grid-template-columns: 1fr;
        }
        
        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }
        
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border-color: #667eea;
        }
        
        .list-view .image-card {
            display: flex;
            align-items: center;
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f8f9fa;
            cursor: pointer;
        }
        
        .list-view .image-preview {
            width: 100px;
            height: 100px;
        }
        
        .image-info {
            padding: 1rem;
            background: white;
        }
        
        .list-view .image-info {
            flex: 1;
        }
        
        .image-name {
            font-weight: 600;
            color: #212529;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }
        
        .image-meta {
            font-size: 0.85rem;
            color: #6c757d;
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .image-url {
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: monospace;
            word-break: break-all;
            margin: 0.5rem 0;
            border: 1px solid #e9ecef;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            width: 100%;
            justify-content: center;
        }
        
        .copy-btn:hover {
            background: #5a67d8;
        }
        
        .copy-btn.copied {
            background: #48bb78;
        }
        
        .badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        
        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            background: #f8f9fa;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            header h1 { font-size: 1.8rem; }
            .stats { flex-direction: column; gap: 0.5rem; }
            .stat-item { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Repositorio de Imágenes</h1>
            <p>Revista Nacional de Ciencias para Estudiantes</p>
            <div class="stats" id="stats"></div>
        </header>
        
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar imágenes por nombre...">
            </div>
        </div>
        
        <div class="gallery-header">
            <h2 id="galleryTitle">Todas las imágenes</h2>
            <div class="view-controls">
                <button class="view-btn active" onclick="setView('grid')">📱 Grid</button>
                <button class="view-btn" onclick="setView('list')">📋 Lista</button>
            </div>
        </div>
        
        <div class="gallery" id="gallery"></div>
        
        <footer>
            <p>Las imágenes están disponibles en formato WebP optimizado</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem;">Actualizado: <span id="updateDate"></span></p>
        </footer>
    </div>
    
    <div class="modal" id="imageModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="Vista previa">
        </div>
    </div>
    
    <script>
        let images = [];
        let currentView = 'grid';
        
        async function loadImages() {
            try {
                const response = await fetch('./list.json?t=' + Date.now());
                if (!response.ok) throw new Error('No se pudo cargar la lista');
                images = await response.json();
                
                document.getElementById('updateDate').textContent = new Date().toLocaleString('es-CL');
                document.getElementById('stats').innerHTML = \`
                    <div class="stat-item">📸 \${images.length} imágenes</div>
                    <div class="stat-item">⚡ Formato WebP optimizado</div>
                \`;
                
                renderGallery();
            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('gallery').innerHTML = \`
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <p style="color: #dc3545;">Error al cargar las imágenes</p>
                        <button onclick="loadImages()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Reintentar
                        </button>
                    </div>
                \`;
            }
        }
        
        function renderGallery() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = images.filter(img => 
                img.name.toLowerCase().includes(searchTerm)
            );
            
            document.getElementById('galleryTitle').textContent = 
                filtered.length === images.length 
                    ? \`Todas las imágenes (\${filtered.length})\`
                    : \`Resultados (\${filtered.length} de \${images.length})\`;
            
            const gallery = document.getElementById('gallery');
            gallery.className = \`gallery \${currentView === 'list' ? 'list-view' : ''}\`;
            
            if (filtered.length === 0) {
                gallery.innerHTML = \`
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <p style="color: #6c757d;">No se encontraron imágenes</p>
                    </div>
                \`;
                return;
            }
            
            gallery.innerHTML = filtered.map(img => \`
                <div class="image-card" data-name="\${img.name}">
                    <img class="image-preview" src="./\${img.path}" alt="\${img.name}" 
                         onclick="openModal('./\${img.path}')"
                         onerror="this.src='https://via.placeholder.com/300?text=Error'">
                    <span class="badge">\${img.extension}</span>
                    <div class="image-info">
                        <div class="image-name">\${img.name}</div>
                        <div class="image-meta">
                            <span>📦 \${img.size}</span>
                            <span>📅 \${new Date(img.modified).toLocaleDateString()}</span>
                        </div>
                        <div class="image-url" id="url-\${img.name}">
                            \${window.location.origin}\${window.location.pathname}\${img.path}
                        </div>
                        <button class="copy-btn" onclick="copyToClipboard('\${img.path}', this)">
                            <span>📋 Copiar URL</span>
                        </button>
                    </div>
                </div>
            \`).join('');
        }
        
        async function copyToClipboard(path, btn) {
            const url = \`\${window.location.origin}\${window.location.pathname}\${path}\`;
            try {
                await navigator.clipboard.writeText(url);
                btn.classList.add('copied');
                btn.innerHTML = '✓ ¡Copiado!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '📋 Copiar URL';
                }, 2000);
            } catch (err) {
                alert('Error al copiar');
            }
        }
        
        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGallery();
        }
        
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }
        
        document.getElementById('searchInput').addEventListener('input', renderGallery);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        loadImages();
    </script>
</body>
</html>
