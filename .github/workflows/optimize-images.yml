name: Optimize Images & Deploy to Pages

on:
  push:
    branches: [ main ]
    paths:
      - '**.jpg'
      - '**.jpeg'
      - '**.png'
      - '**.gif'
      - '**.svg'
      - 'gallery/**'
  workflow_dispatch: # Permite ejecución manual

# Permisos necesarios para Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Permite solo una ejecución concurrente
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  optimize-and-deploy:
    runs-on: ubuntu-latest
    # Estrategia para manejar múltiples ejecuciones
    strategy:
      max-parallel: 1 # Evita conflictos de escritura
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # Importante para evitar conflictos
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sharp for image optimization
        run: npm install -g sharp-cli

      - name: Optimize images with parallel processing
        run: |
          # Configuración optimizada
          MAX_PARALLEL=4 # Procesar 4 imágenes a la vez
          
          # Contadores
          total_files=0
          processed_files=0
          
          echo "🔍 Buscando imágenes para optimizar..."
          
          # Función para procesar archivos en paralelo
          process_files() {
            local ext=$1
            local quality=$2
            
            # Encontrar archivos y procesarlos en paralelo
            find . -type f -iname "*.$ext" -print0 | while IFS= read -r -d '' file; do
              ((total_files++))
              (
                dir=$(dirname "$file")
                filename=$(basename "$file")
                name="${filename%.*}"
                
                echo "🖼️ [$ext] Optimizando: $filename"
                
                # Optimizar según extensión
                if [[ "$ext" == "png" ]]; then
                  sharp -i "$file" -o "$dir/$name.webp" --quality $quality --effort 6 --lossless
                elif [[ "$ext" == "jpg" || "$ext" == "jpeg" ]]; then
                  sharp -i "$file" -o "$dir/$name.webp" --quality $quality --effort 6 --mozjpeg
                fi
                
                # Verificar que el archivo se creó correctamente
                if [ -f "$dir/$name.webp" ]; then
                  # Comparar tamaños
                  orig_size=$(stat -c%s "$file" 2>/dev/null || echo "0")
                  webp_size=$(stat -c%s "$dir/$name.webp" 2>/dev/null || echo "0")
                  
                  # Si WebP es más grande, mantener original pero optimizarlo
                  if [ "$webp_size" -gt "$orig_size" ] && [ "$orig_size" -gt 0 ]; then
                    echo "⚠️ WebP más grande que original, optimizando JPG/PNG con calidad reducida"
                    sharp -i "$file" -o "$dir/$name-optimized.$ext" --quality 70
                    mv "$dir/$name-optimized.$ext" "$file"
                    rm "$dir/$name.webp"
                  else
                    # Eliminar archivo original si WebP es más pequeño
                    rm "$file"
                    echo "✅ [$ext] Optimizado: $filename → $name.webp (Ahorro: $(($orig_size - $webp_size)) bytes)"
                  fi
                else
                  echo "❌ Error creando WebP para: $filename"
                fi
              ) &
              
              # Control de procesos paralelos
              if [[ $(jobs -r -p | wc -l) -ge $MAX_PARALLEL ]]; then
                wait -n
              fi
            done
            
            # Esperar a que terminen todos los procesos
            wait
          }
          
          # Procesar diferentes formatos
          echo "📸 Procesando JPG/JPEG..."
          process_files "jpg" 80
          process_files "jpeg" 80
          
          echo "📸 Procesando PNG..."
          process_files "png" 85
          
          echo "📊 Total de archivos procesados: $total_files"

      - name: Generate gallery files (optimizado)
        run: |
          # Crear directorio para la galería
          mkdir -p gallery
          
          # Generar list.json con todas las imágenes (optimizado con parallel)
          echo "[" > gallery/list.json.tmp
          
          # Procesar archivos en paralelo para generar el JSON
          find . -type f \( -name "*.webp" -o -name "*.gif" -o -name "*.svg" \) -print0 | while IFS= read -r -d '' img; do
            (
              filename=$(basename "$img")
              ext="${filename##*.}"
              size=$(du -h "$img" | cut -f1)
              modified=$(date -r "$img" +"%Y-%m-%dT%H:%M:%S%z" 2>/dev/null || date +"%Y-%m-%dT%H:%M:%S%z")
              path="${img#./}"
              
              # Crear entrada JSON
              cat << EOF
          {
            "name": "$filename",
            "path": "$path",
            "extension": "$ext",
            "size": "$size",
            "modified": "$modified"
          }
          EOF
            ) >> gallery/list.json.entries &
            
            # Control de procesos paralelos
            if [[ $(jobs -r -p | wc -l) -ge 8 ]]; then
              wait -n
            fi
          done
          
          wait
          
          # Combinar entradas en un JSON válido
          entries=$(cat gallery/list.json.entries 2>/dev/null | paste -sd "," -)
          echo "$entries" >> gallery/list.json.tmp
          echo "]" >> gallery/list.json.tmp
          
          # Limpiar archivos temporales
          rm -f gallery/list.json.entries
          mv gallery/list.json.tmp gallery/list.json
          
          # Copiar el index.html optimizado (con caché)
          cp -f .github/scripts/gallery-index.html gallery/index.html 2>/dev/null || cat > gallery/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Galería de Imágenes Optimizadas</title>
              <style>
                  /* CSS optimizado y minificado */
                  *{margin:0;padding:0;box-sizing:border-box}
                  body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0,#764ba2 100%);min-height:100vh;padding:2rem}
                  .container{max-width:1400px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
                  header{background:linear-gradient(135deg,#667eea 0,#764ba2 100%);color:#fff;padding:2rem;text-align:center}
                  header h1{font-size:2.5rem;margin-bottom:.5rem}
                  .stats{display:flex;justify-content:center;gap:2rem;margin-top:1.5rem}
                  .stat-item{background:rgba(255,255,255,.2);padding:.5rem 1.5rem;border-radius:50px;backdrop-filter:blur(10px)}
                  .search-section{padding:1.5rem;background:#f8f9fa;border-bottom:1px solid #e9ecef}
                  .search-box{max-width:600px;margin:0 auto;position:relative}
                  .search-box input{width:100%;padding:1rem 1rem 1rem 3rem;border:2px solid #e9ecef;border-radius:50px;font-size:1rem}
                  .search-box input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
                  .search-box .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#adb5bd}
                  .gallery-header{padding:1rem 2rem;background:#fff;border-bottom:1px solid #e9ecef;display:flex;justify-content:space-between;align-items:center}
                  .view-controls{display:flex;gap:.5rem}
                  .view-btn{padding:.5rem 1rem;border:1px solid #dee2e6;background:#fff;border-radius:8px;cursor:pointer}
                  .view-btn.active{background:#667eea;color:#fff;border-color:#667eea}
                  .gallery{padding:2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5rem}
                  .gallery.list-view{grid-template-columns:1fr}
                  .image-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,.1);transition:.3s;border:2px solid transparent;position:relative}
                  .image-card:hover{transform:translateY(-5px);box-shadow:0 8px 15px rgba(0,0,0,.2);border-color:#667eea}
                  .list-view .image-card{display:flex;align-items:center}
                  .image-preview{width:100%;height:200px;object-fit:cover;background:#f8f9fa;cursor:pointer}
                  .list-view .image-preview{width:100px;height:100px}
                  .image-info{padding:1rem}
                  .image-name{font-weight:600;color:#212529;margin-bottom:.5rem;word-break:break-all}
                  .image-meta{font-size:.85rem;color:#6c757d;display:flex;gap:1rem;margin-bottom:.5rem}
                  .image-url{background:#f8f9fa;padding:.5rem;border-radius:6px;font-size:.8rem;font-family:monospace;word-break:break-all;margin:.5rem 0;border:1px solid #e9ecef}
                  .copy-btn{background:#667eea;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem}
                  .copy-btn.copied{background:#48bb78}
                  .badge{position:absolute;top:.5rem;right:.5rem;background:rgba(0,0,0,.7);color:#fff;padding:.25rem .75rem;border-radius:50px;font-size:.75rem;backdrop-filter:blur(5px)}
                  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;justify-content:center;align-items:center}
                  .modal.active{display:flex}
                  .modal-content{max-width:90%;max-height:90%}
                  .modal-content img{width:100%;height:100%;object-fit:contain}
                  .modal-close{position:absolute;top:1rem;right:1rem;color:#fff;font-size:2rem;cursor:pointer;width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center}
                  footer{text-align:center;padding:1.5rem;background:#f8f9fa;color:#6c757d;border-top:1px solid #e9ecef}
                  @media(max-width:768px){body{padding:1rem}header h1{font-size:1.8rem}.stats{flex-direction:column;gap:.5rem}}
              </style>
          </head>
          <body>
              <div class="container">
                  <header>
                      <h1>📸 Galería de Imágenes</h1>
                      <div class="stats" id="stats"></div>
                  </header>
                  <div class="search-section">
                      <div class="search-box">
                          <span class="search-icon">🔍</span>
                          <input type="text" id="searchInput" placeholder="Buscar imágenes...">
                      </div>
                  </div>
                  <div class="gallery-header">
                      <h2 id="galleryTitle">Todas las imágenes</h2>
                      <div class="view-controls">
                          <button class="view-btn active" onclick="setView('grid')">📱 Grid</button>
                          <button class="view-btn" onclick="setView('list')">📋 Lista</button>
                      </div>
                  </div>
                  <div class="gallery" id="gallery"></div>
                  <footer>
                      <p>Imágenes optimizadas en WebP · <span id="updateDate"></span></p>
                  </footer>
              </div>
              <div class="modal" id="imageModal" onclick="closeModal()">
                  <span class="modal-close">&times;</span>
                  <div class="modal-content">
                      <img id="modalImage" src="" alt="Vista previa">
                  </div>
              </div>
              <script>
                  let images=[],currentView='grid';
                  async function loadImages(){try{
                      const r=await fetch('./list.json?t='+Date.now());
                      if(!r.ok)throw new Error('Error');
                      images=await r.json();
                      document.getElementById('updateDate').textContent=new Date().toLocaleString();
                      document.getElementById('stats').innerHTML=\`
                          <div class="stat-item">📸 \${images.length} imágenes</div>
                          <div class="stat-item">⚡ WebP optimizado</div>
                      \`;
                      renderGallery();
                  }catch(e){console.error(e)}}
                  function renderGallery(){
                      const term=document.getElementById('searchInput').value.toLowerCase(),
                            filtered=images.filter(i=>i.name.toLowerCase().includes(term)),
                            gallery=document.getElementById('gallery');
                      gallery.className=\`gallery \${currentView==='list'?'list-view':''}\`;
                      document.getElementById('galleryTitle').textContent=
                          filtered.length===images.length?\`Todas las imágenes (\${filtered.length})\`:
                          \`Resultados (\${filtered.length} de \${images.length})\`;
                      if(!filtered.length){gallery.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem">No se encontraron imágenes</div>';return}
                      gallery.innerHTML=filtered.map(i=>\`
                          <div class="image-card">
                              <img class="image-preview" src="./\${i.path}" alt="\${i.name}" onclick="openModal('./\${i.path}')">
                              <span class="badge">\${i.extension}</span>
                              <div class="image-info">
                                  <div class="image-name">\${i.name}</div>
                                  <div class="image-meta">
                                      <span>📦 \${i.size}</span>
                                      <span>📅 \${new Date(i.modified).toLocaleDateString()}</span>
                                  </div>
                                  <div class="image-url">\${window.location.origin}\${window.location.pathname}\${i.path}</div>
                                  <button class="copy-btn" onclick="copyUrl('\${i.path}',this)">📋 Copiar URL</button>
                              </div>
                          </div>
                      \`).join('');
                  }
                  async function copyUrl(p,b){const url=\`\${window.location.origin}\${window.location.pathname}\${p}\`;try{await navigator.clipboard.writeText(url);b.classList.add('copied');b.innerHTML='✓ Copiado!';setTimeout(()=>{b.classList.remove('copied');b.innerHTML='📋 Copiar URL'},2000)}catch(e){alert('Error')}}
                  function setView(v){currentView=v;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderGallery()}
                  function openModal(s){document.getElementById('modalImage').src=s;document.getElementById('imageModal').classList.add('active')}
                  function closeModal(){document.getElementById('imageModal').classList.remove('active')}
                  document.getElementById('searchInput').addEventListener('input',renderGallery);
                  document.addEventListener('keydown',e=>e.key==='Escape'&&closeModal());
                  loadImages();
              </script>
          </body>
          </html>
          EOF
          
          # Crear archivo .nojekyll para evitar procesamiento de Jekyll
          touch gallery/.nojekyll

      - name: Commit and push optimized images
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Añadir cambios
          git add .
          
          # Intentar commit y push con reintentos
          max_retries=3
          retry_count=0
          
          while [ $retry_count -lt $max_retries ]; do
            if git diff --staged --quiet; then
              echo "No hay cambios para commit"
              break
            else
              git commit -m "Optimize images: convert to WebP [skip ci]"
              
              # Pull antes de push para evitar conflictos
              git pull --rebase origin main
              
              if git push; then
                echo "✅ Push exitoso"
                break
              else
                retry_count=$((retry_count + 1))
                echo "⚠️ Push falló, reintento $retry_count/$max_retries"
                sleep 5
                git pull --rebase origin main
              fi
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gallery'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 60000
          error_count: 10
          reporting_interval: 5000