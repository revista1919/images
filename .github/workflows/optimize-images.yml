name: 🚀 Optimize ALL Images & Deploy to Pages

on:
  push:
    branches: [ main ]
    paths:
      - '**.jpg'
      - '**.jpeg'
      - '**.png'
      - '**.gif'
      - '**.svg'
      - '**.webp'
      - 'gallery/**'
  workflow_dispatch: # Permite ejecución manual
  schedule:
    - cron: '0 */6 * * *' # Ejecutar cada 6 horas para asegurar

# Permisos necesarios para Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Permite solo una ejecución concurrente
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  optimize-and-deploy:
    runs-on: ubuntu-latest
    # Estrategia para manejar múltiples ejecuciones
    strategy:
      max-parallel: 1
    
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sharp for image optimization
        run: npm install -g sharp-cli

      - name: 🔍 Find ALL images (including existing WebP)
        id: find-images
        run: |
          echo "🔍 Escaneando TODAS las imágenes en el repositorio..."
          
          # Crear archivo con lista completa de imágenes
          echo "📸 Imágenes encontradas:" > all-images.log
          
          # Buscar TODOS los formatos de imagen
          find . -type f \( \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.png" -o \
            -iname "*.gif" -o \
            -iname "*.svg" -o \
            -iname "*.webp" \) \
            -not -path "*/\.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/gallery/*" | while read img; do
            echo "$img" >> all-images.log
          done
          
          # Contar imágenes
          total_images=$(wc -l < all-images.log)
          echo "📊 TOTAL de imágenes encontradas: $total_images"
          echo "total_images=$total_images" >> $GITHUB_OUTPUT
          
          # Mostrar las primeras 10 como ejemplo
          echo "📋 Primeras 10 imágenes:" 
          head -10 all-images.log

      - name: 🖼️ Optimize ALL images (brute force approach)
        run: |
          echo "🔄 Iniciando optimización MASIVA de imágenes..."
          
          # Configuración
          MAX_PARALLEL=8 # Más procesos paralelos
          total_processed=0
          total_errors=0
          
          # Función para optimizar cualquier imagen a WebP
          optimize_image() {
            local file=$1
            local dir=$(dirname "$file")
            local filename=$(basename "$file")
            local name="${filename%.*}"
            local ext="${filename##*.}"
            
            # Normalizar extensión a minúsculas
            ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            
            # Determinar calidad según formato original
            local quality=85
            case "$ext" in
              jpg|jpeg) quality=80 ;;
              png) quality=85 ;;
              webp) quality=90 ;;
              *) quality=80 ;;
            esac
            
            # Archivo de salida WebP
            local webp_file="$dir/$name.webp"
            
            echo "⚙️ Procesando: $filename"
            
            # Casos especiales
            case "$ext" in
              gif)
                # Para GIF, mantener original pero también crear copia
                cp "$file" "$dir/$name.gif"
                echo "✅ GIF preservado: $filename"
                return 0
                ;;
              svg)
                # SVG no necesita optimización
                echo "✅ SVG preservado: $filename"
                return 0
                ;;
              webp)
                # Ya es WebP, verificar si necesita re-optimización
                local size=$(stat -c%s "$file" 2>/dev/null || echo "0")
                if [ "$size" -gt 102400 ]; then # Mayor a 100KB
                  echo "🔄 Re-optimizando WebP grande: $filename"
                  sharp -i "$file" -o "$webp_file.tmp" --quality $quality --effort 6
                  if [ -f "$webp_file.tmp" ]; then
                    mv "$webp_file.tmp" "$file"
                  fi
                fi
                echo "✅ WebP verificado: $filename"
                return 0
                ;;
              jpg|jpeg|png)
                # Convertir a WebP
                sharp -i "$file" -o "$webp_file" --quality $quality --effort 6
                
                if [ -f "$webp_file" ]; then
                  # Comparar tamaños
                  orig_size=$(stat -c%s "$file" 2>/dev/null || echo "0")
                  webp_size=$(stat -c%s "$webp_file" 2>/dev/null || echo "0")
                  
                  # Decidir si mantener original
                  if [ "$webp_size" -lt "$orig_size" ] || [ "$orig_size" -eq 0 ]; then
                    # WebP es más pequeño, eliminar original
                    rm -f "$file"
                    echo "✅ Reemplazado: $filename → WebP (ahorro: $((orig_size - webp_size)) bytes)"
                  else
                    # WebP es más grande, mantener original pero optimizarlo
                    sharp -i "$file" -o "$file.optimized" --quality 70
                    if [ -f "$file.optimized" ]; then
                      mv "$file.optimized" "$file"
                      rm -f "$webp_file"
                      echo "⚠️ Optimizado original: $filename (mantenido)"
                    fi
                  fi
                else
                  echo "❌ Error creando WebP para: $filename"
                  return 1
                fi
                ;;
            esac
            
            return 0
          }
          
          # Procesar TODAS las imágenes con control de errores
          while IFS= read -r file; do
            (
              if optimize_image "$file"; then
                echo "✅ Éxito: $file" >> processing.log
              else
                echo "❌ Error: $file" >> error.log
                total_errors=$((total_errors + 1))
              fi
            ) &
            
            # Control de procesos paralelos
            if [[ $(jobs -r -p | wc -l) -ge $MAX_PARALLEL ]]; then
              wait -n
            fi
            
            total_processed=$((total_processed + 1))
            
            # Mostrar progreso cada 10 imágenes
            if [ $((total_processed % 10)) -eq 0 ]; then
              echo "📊 Progreso: $total_processed / ${{ steps.find-images.outputs.total_images }} imágenes"
            fi
          done < all-images.log
          
          # Esperar a que terminen todos los procesos
          wait
          
          echo "📊 RESUMEN FINAL:"
          echo "   Total procesadas: $total_processed"
          echo "   Errores: $total_errors"
          
          if [ -f error.log ]; then
            echo "⚠️ Imágenes con errores:"
            cat error.log
          fi

      - name: 🔄 Force sync ALL images to gallery
        run: |
          echo "🔄 Sincronizando FORZOSAMENTE TODAS las imágenes a gallery..."
          
          # Limpiar directorio gallery
          rm -rf gallery
          mkdir -p gallery
          
          # Copiar TODAS las imágenes al directorio gallery (incluyendo subdirectorios)
          echo "📋 Copiando imágenes manteniendo estructura..."
          
          # Encontrar y copiar TODAS las imágenes
          find . -type f \( \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.png" -o \
            -iname "*.gif" -o \
            -iname "*.svg" -o \
            -iname "*.webp" \) \
            -not -path "*/\.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/gallery/*" | while read img; do
            
            # Crear estructura de directorios en gallery
            rel_path="${img#./}"
            dir_path=$(dirname "$rel_path")
            mkdir -p "gallery/$dir_path"
            
            # Copiar imagen
            cp "$img" "gallery/$rel_path"
            echo "  Copiada: $rel_path"
          done
          
          # Verificar que se copiaron todas
          echo "🔍 Verificando integridad..."
          
          original_count=$(find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.svg" -o -iname "*.webp" \) -not -path "*/\.git/*" -not -path "*/node_modules/*" -not -path "*/gallery/*" | wc -l)
          gallery_count=$(find gallery -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.svg" -o -iname "*.webp" \) | wc -l)
          
          echo "📊 Originales: $original_count | En gallery: $gallery_count"
          
          if [ "$original_count" -eq "$gallery_count" ]; then
            echo "✅ VERIFICACIÓN EXITOSA: Todas las imágenes están en gallery"
          else
            echo "⚠️ ADVERTENCIA: Discrepancia en número de imágenes"
          fi

      - name: 📊 Generate COMPLETE gallery files
        run: |
          echo "📊 Generando archivos de galería COMPLETOS..."
          
          # Iniciar JSON
          echo "[" > gallery/list.json
          
          # Contador
          first=true
          total_in_json=0
          
          # Recorrer TODAS las imágenes en gallery
          find gallery -type f \( \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.png" -o \
            -iname "*.gif" -o \
            -iname "*.svg" -o \
            -iname "*.webp" \) | sort | while read img; do
            
            # Obtener información
            filename=$(basename "$img")
            ext="${filename##*.}"
            size=$(du -h "$img" | cut -f1)
            modified=$(date -r "$img" +"%Y-%m-%dT%H:%M:%S%z" 2>/dev/null || date +"%Y-%m-%dT%H:%M:%S%z")
            path="${img#gallery/}"
            
            # Añadir coma si no es el primero
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> gallery/list.json
            fi
            
            # Añadir entrada JSON (escapando caracteres especiales)
            printf '  {\n' >> gallery/list.json
            printf '    "name": "%s",\n' "$(echo "$filename" | sed 's/"/\\"/g')" >> gallery/list.json
            printf '    "path": "%s",\n' "$(echo "$path" | sed 's/"/\\"/g')" >> gallery/list.json
            printf '    "extension": "%s",\n' "$ext" >> gallery/list.json
            printf '    "size": "%s",\n' "$size" >> gallery/list.json
            printf '    "modified": "%s"\n' "$modified" >> gallery/list.json
            printf '  }' >> gallery/list.json
            
            total_in_json=$((total_in_json + 1))
          done
          
          # Cerrar JSON
          echo "" >> gallery/list.json
          echo "]" >> gallery/list.json
          
          # Validar JSON
          if command -v jq &> /dev/null; then
            if jq empty gallery/list.json 2>/dev/null; then
              echo "✅ JSON válido"
            else
              echo "❌ JSON inválido, creando versión simplificada..."
              # Versión simplificada si hay error
              find gallery -type f -name "*.webp" -o -name "*.jpg" -o -name "*.png" | while read img; do
                echo "\"$(basename "$img")\""
              done > gallery/simple-list.txt
            fi
          fi
          
          echo "📊 Total imágenes en JSON: $total_in_json"
          
          # Crear archivo .nojekyll
          touch gallery/.nojekyll
          
          # Crear archivo README en gallery
          cat > gallery/README.md << EOF
          # Galería de Imágenes
          
          **Total de imágenes:** $total_in_json
          **Última actualización:** $(date)
          
          Esta galería contiene TODAS las imágenes del repositorio en formato optimizado.
          EOF
          
          # Crear archivo de verificación
          echo "$total_in_json" > gallery/image-count.txt
          date >> gallery/image-count.txt

      - name: 💾 Commit ALL changes with force
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          echo "💾 Preparando commit MASIVO..."
          
          # Asegurarse de que estamos en la rama correcta
          git fetch origin main
          git checkout main
          
          # Forzar añadir todos los cambios (incluyendo eliminaciones)
          git add -A --force
          
          # Verificar cambios
          if git diff --staged --quiet; then
            echo "✅ No hay cambios para commit"
          else
            # Mostrar resumen de cambios
            echo "📊 Cambios a commitear:"
            git diff --staged --stat
            
            # Commit con mensaje descriptivo
            git commit -m "🔥 Actualización MASIVA de imágenes [skip ci]
            
            - Procesadas todas las imágenes del repositorio
            - Sincronización forzosa a gallery
            - Actualización completa del listado
            - Timestamp: $(date)"
            
            # Push con reintentos y force-with-lease
            max_retries=5
            retry_count=0
            
            while [ $retry_count -lt $max_retries ]; do
              echo "🔄 Intento de push $((retry_count + 1))/$max_retries"
              
              # Pull con rebase
              git pull --rebase origin main
              
              if git push origin main; then
                echo "✅ Push exitoso"
                break
              else
                retry_count=$((retry_count + 1))
                if [ $retry_count -lt $max_retries ]; then
                  echo "⚠️ Push falló, reintentando en 5 segundos..."
                  sleep 5
                fi
              fi
            done
          fi

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gallery'
          retention-days: 1
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 120000
          error_count: 20
          reporting_interval: 5000
          
      - name: ✅ Verify deployment
        run: |
          echo "✅ Verificando despliegue..."
          
          # Esperar a que Pages esté disponible
          sleep 10
          
          # Verificar que el sitio está accesible
          SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "🌐 Sitio desplegado en: $SITE_URL"
          
          # Verificar archivos críticos
          if [ -f gallery/list.json ] && [ -f gallery/index.html ]; then
            echo "✅ Archivos críticos presentes"
            
            # Mostrar estadísticas finales
            img_count=$(jq '. | length' gallery/list.json 2>/dev/null || echo "0")
            echo "📊 TOTAL FINAL DE IMÁGENES: $img_count"
          else
            echo "⚠️ Archivos críticos faltantes"
          fi

      - name: 📝 Create deployment summary
        if: always()
        run: |
          echo "## 📊 Resumen de Despliegue" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Estado:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total de imágenes:** $(jq '. | length' gallery/list.json 2>/dev/null || echo '0')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL del sitio:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Última actualización:** $(date)" >> $GITHUB_STEP_SUMMARY